  <script>
    'use strict';

    // ========================================
    // Configuration
    // ========================================
    const ADMIN_CONFIG = {
      authMode: 'dev',
      devPassword: 'wpkscm',
      allQuestionsApiUrl: 'https://scmchatbot-api-e9bdbzbgeae3ecgj.koreasouth-01.azurewebsites.net/api/getAllQuestions',
      statsApiUrl: 'https://scmchatbot-api-e9bdbzbgeae3ecgj.koreasouth-01.azurewebsites.net/api/getQuestionStats',
      unmatchedApiUrl: 'https://scmchatbot-api-e9bdbzbgeae3ecgj.koreasouth-01.azurewebsites.net/api/getUnmatched',
      requestTimeoutMs: 12000
    };

    // ========================================
    // Global State
    // ========================================
    let currentPage = 1;
    const itemsPerPage = 20;
    let autoRefreshInterval = null;
    let isLoggedIn = false;

    // ========================================
    // DOM Elements
    // ========================================
    const loginSection = document.getElementById('loginSection');
    const mainContent = document.getElementById('mainContent');
    const adminPassword = document.getElementById('adminPassword');
    const questionList = document.getElementById('questionList');
    const questionPagination = document.getElementById('questionPagination');
    const matchedFilter = document.getElementById('matchedFilter');
    const categoryFilter = document.getElementById('categoryFilter');
    const searchQuestion = document.getElementById('searchQuestion');
    const autoRefresh = document.getElementById('autoRefresh');
    const loadingOverlay = document.getElementById('loadingOverlay');

    // Stats elements
    const totalQuestionsCount = document.getElementById('totalQuestionsCount');
    const matchedCount = document.getElementById('matchedCount');
    const unmatchedCount = document.getElementById('unmatchedCount');
    const matchRate = document.getElementById('matchRate');

    // ========================================
    // Authentication
    // ========================================
    function login() {
      const password = adminPassword.value.trim();

      if (!password) {
        showNotice('비밀번호를 입력해 주세요.', 'warning');
        return;
      }

      if (password === ADMIN_CONFIG.devPassword) {
        isLoggedIn = true;
        loginSection.classList.add('hidden');
        mainContent.classList.remove('hidden');
        showNotice('로그인 성공!', 'success');
        loadQuestionMonitor();
      } else {
        showNotice('비밀번호가 올바르지 않습니다.', 'error');
        adminPassword.value = '';
      }
    }

    // Enter key login
    adminPassword.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        login();
      }
    });

    // ========================================
    // Network Functions
    // ========================================
    async function fetchWithTimeout(url, options = {}, timeout = ADMIN_CONFIG.requestTimeoutMs) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeout);

      try {
        const response = await fetch(url, {
          ...options,
          signal: controller.signal,
          headers: {
            'Content-Type': 'application/json',
            ...options.headers
          }
        });
        clearTimeout(timeoutId);
        return response;
      } catch (err) {
        clearTimeout(timeoutId);
        throw err;
      }
    }

    // ========================================
    // API Functions
    // ========================================
    async function fetchQuestionStats() {
      try {
        const response = await fetchWithTimeout(ADMIN_CONFIG.statsApiUrl);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const data = await response.json();
        return data.ok !== false ? data : null;
      } catch (err) {
        console.error('[통계 조회 오류]', err);
        return null;
      }
    }

    async function fetchAllQuestions(matched = 'all', limit = 20, offset = 0, category = 'all', search = '') {
      try {
        const params = new URLSearchParams({
          matched,
          limit: limit.toString(),
          offset: offset.toString()
        });
        
        if (category !== 'all') params.append('category', category);
        if (search) params.append('search', search);

        const url = `${ADMIN_CONFIG.allQuestionsApiUrl}?${params.toString()}`;
        const response = await fetchWithTimeout(url);

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        return data.ok !== false ? data : { total: 0, questions: [] };
      } catch (err) {
        console.error('[질문 조회 오류]', err);
        return { total: 0, questions: [] };
      }
    }

    // ========================================
    // Render Functions
    // ========================================
    function updateStats(stats) {
      if (!stats) return;

      totalQuestionsCount.textContent = stats.totalQuestions || 0;
      matchedCount.textContent = stats.matchedCount || 0;
      unmatchedCount.textContent = stats.unmatchedCount || 0;
      matchRate.textContent = (stats.matchRate || '0') + '%';
    }

    function renderQuestionItem(item) {
      const div = document.createElement('div');
      div.className = 'question-item';

      const matchedBadge = item.matched 
        ? '<span class="badge matched">✓ 답변 있음</span>' 
        : '<span class="badge unmatched">✗ 답변 없음</span>';

      const sourceBadge = item.source === 'faq-click' 
        ? '<span class="badge faq">FAQ 클릭</span>' 
        : '';

      const categoryLabel = getCategoryLabel(item.category);
      const timestamp = item.timestamp ? new Date(item.timestamp).toLocaleString('ko-KR') : '알 수 없음';

      div.innerHTML = `
        <div class="question-content">
          <div class="question-text">${escapeHTML(item.question)}</div>
          <div class="question-meta">
            <span>🕒 ${timestamp}</span>
            <span>📁 ${categoryLabel}</span>
            ${matchedBadge}
            ${sourceBadge}
            ${item.count > 1 ? `<span>🔁 ${item.count}회</span>` : ''}
          </div>
        </div>
        <div class="question-actions">
          ${!item.matched ? `
            <button class="btn-add-answer" onclick="addAnswerForQuestion(\`${escapeHTML(item.question)}\`, '${item.category}')">
              📝 답변 추가
            </button>
          ` : ''}
        </div>
      `;

      return div;
    }

    function renderQuestionList(questions) {
      questionList.innerHTML = '';

      if (!questions || questions.length === 0) {
        questionList.innerHTML = '<div class="empty-state">표시할 질문이 없습니다.</div>';
        return;
      }

      questions.forEach(item => {
        questionList.appendChild(renderQuestionItem(item));
      });
    }

    function renderPagination(total) {
      questionPagination.innerHTML = '';

      const totalPages = Math.ceil(total / itemsPerPage);
      if (totalPages <= 1) return;

      // Previous button
      const prevBtn = document.createElement('button');
      prevBtn.textContent = '◀';
      prevBtn.disabled = currentPage === 1;
      prevBtn.onclick = () => {
        currentPage--;
        loadQuestionMonitor();
      };
      questionPagination.appendChild(prevBtn);

      // Page numbers
      const startPage = Math.max(1, currentPage - 2);
      const endPage = Math.min(totalPages, currentPage + 2);

      for (let i = startPage; i <= endPage; i++) {
        const pageBtn = document.createElement('button');
        pageBtn.textContent = i;
        pageBtn.className = i === currentPage ? 'active' : '';
        pageBtn.onclick = () => {
          currentPage = i;
          loadQuestionMonitor();
        };
        questionPagination.appendChild(pageBtn);
      }

      // Next button
      const nextBtn = document.createElement('button');
      nextBtn.textContent = '▶';
      nextBtn.disabled = currentPage === totalPages;
      nextBtn.onclick = () => {
        currentPage++;
        loadQuestionMonitor();
      };
      questionPagination.appendChild(nextBtn);
    }

    // ========================================
    // Main Load Function
    // ========================================
    async function loadQuestionMonitor() {
      if (!isLoggedIn) return;

      showLoading();

      try {
        // Load stats
        const stats = await fetchQuestionStats();
        updateStats(stats);

        // Load questions
        const matchedValue = matchedFilter.value;
        const categoryValue = categoryFilter.value;
        const searchValue = searchQuestion.value.trim();
        const offset = (currentPage - 1) * itemsPerPage;

        const result = await fetchAllQuestions(
          matchedValue,
          itemsPerPage,
          offset,
          categoryValue,
          searchValue
        );

        renderQuestionList(result.questions);
        renderPagination(result.total);

      } catch (err) {
        console.error('[모니터링 로드 오류]', err);
        showNotice('질문 목록을 불러올 수 없습니다.', 'error');
      } finally {
        hideLoading();
      }
    }

    // ========================================
    // Action Functions
    // ========================================
    function addAnswerForQuestion(question, category) {
      // TODO: Q&A 관리 섹션으로 스크롤 및 자동 입력 (향후 구현)
      alert(`"${question}" 에 대한 답변을 추가하세요.\n\n카테고리: ${getCategoryLabel(category)}\n\n로컬 Q&A 데이터(shared.js)에 직접 추가하거나, 별도 관리 UI를 구현하세요.`);
    }

    // ========================================
    // Auto Refresh
    // ========================================
    autoRefresh.addEventListener('change', (e) => {
      if (e.target.checked) {
        autoRefreshInterval = setInterval(loadQuestionMonitor, 30000);
        showNotice('자동 갱신이 활성화되었습니다.', 'success');
      } else {
        if (autoRefreshInterval) {
          clearInterval(autoRefreshInterval);
          autoRefreshInterval = null;
        }
        showNotice('자동 갱신이 비활성화되었습니다.', 'info');
      }
    });

    // Filter change events
    matchedFilter.addEventListener('change', () => {
      currentPage = 1;
      loadQuestionMonitor();
    });

    categoryFilter.addEventListener('change', () => {
      currentPage = 1;
      loadQuestionMonitor();
    });

    // Search with debounce
    let searchTimeout;
    searchQuestion.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        currentPage = 1;
        loadQuestionMonitor();
      }, 500);
    });

    // ========================================
    // Utility Functions
    // ========================================
    function showLoading() {
      loadingOverlay.classList.add('active');
    }

    function hideLoading() {
      loadingOverlay.classList.remove('active');
    }

    function escapeHTML(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ✅ 수정됨: 함수 정의 추가
    function getCategoryLabel(category) {
      const labels = {
        all: '전체',
        delivery: '배송',
        documents: '문서',
        production: '생산',
        purchase: '구매',
        unknown: '기타',
        other: '기타'
      };
      return labels[category] || category;
    }

    function showNotice(message, type = 'info') {
      const notice = document.createElement('div');
      notice.className = `notice-alert ${type}`;
      notice.textContent = message;
      document.body.appendChild(notice);

      setTimeout(() => {
        notice.style.animation = 'slideIn 0.3s ease reverse';
        setTimeout(() => notice.remove(), 300);
      }, 3000);
    }

    // ========================================
    // Initialization
    // ========================================
    document.addEventListener('DOMContentLoaded', () => {
      console.log('✅ Admin 페이지 로드 완료');
      adminPassword.focus();
    });

    // Cleanup on unload
    window.addEventListener('beforeunload', () => {
      if (autoRefreshInterval) {
        clearInterval(autoRefreshInterval);
      }
    });
  </script>
