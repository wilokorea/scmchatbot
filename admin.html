<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.azurewebsites.net; img-src 'self' data:; font-src 'self';" />
  <title>SCM 챗봇 관리자</title>
  <style>
    :root {
      --main-tint: #009C82;
      --main-dark: #007a66;
      --main-light: #e6f7f4;
      --bg-color: #f4f8f7;
      --card-bg: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #4a4a4a;
      --text-muted: #888;
      --border-color: #ddd;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-hover: 0 4px 12px rgba(0,0,0,0.12);
      --danger: #e74c3c;
      --warning: #f39c12;
      --success: #27ae60;
      --info: #3498db;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: var(--bg-color);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Header */
    .header {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .avatar {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--main-tint), var(--main-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 1.5rem;
      color: var(--main-dark);
      margin-bottom: 4px;
    }

    .header-text p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* Login Section */
    .login-section {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 40px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      text-align: center;
      max-width: 400px;
      margin: 40px auto;
    }

    .login-section h2 {
      color: var(--main-dark);
      margin-bottom: 24px;
    }

    .login-section input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      font-size: 1rem;
      margin-bottom: 16px;
    }

    .login-section input:focus {
      outline: none;
      border-color: var(--main-tint);
    }

    .login-section button {
      width: 100%;
      padding: 14px;
      background: var(--main-tint);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .login-section button:hover {
      background: var(--main-dark);
      transform: translateY(-2px);
    }

    /* Question Monitor Section */
    .question-monitor-section {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }

    .question-monitor-section h2 {
      color: var(--main-dark);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .question-monitor-section h2::before {
      content: '📊';
      font-size: 1.5rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--main-light);
      padding: 16px;
      border-radius: 12px;
      text-align: center;
      border: 2px solid var(--main-tint);
    }

    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--main-dark);
      display: block;
      margin-bottom: 4px;
    }

    .stat-card .label {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    /* Action Bar */
    .action-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .action-bar button {
      padding: 10px 20px;
      background: var(--main-tint);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      white-space: nowrap;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .action-bar button:hover {
      background: var(--main-dark);
      transform: translateY(-2px);
    }

    .action-bar button.secondary {
      background: var(--text-muted);
    }

    .action-bar button.secondary:hover {
      background: var(--text-secondary);
    }

    .action-bar button.danger {
      background: var(--danger);
    }

    .action-bar button.danger:hover {
      background: #c0392b;
    }

    .action-bar input[type="file"] {
      display: none;
    }

    .filter-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-bar select,
    .filter-bar input {
      padding: 10px 14px;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      font-size: 0.95rem;
      flex: 1;
      min-width: 150px;
    }

    .filter-bar button {
      padding: 10px 20px;
      background: var(--main-tint);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .filter-bar button:hover {
      background: var(--main-dark);
      transform: translateY(-2px);
    }

    .auto-refresh {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .auto-refresh input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    .question-list {
      max-height: 500px;
      overflow-y: auto;
      border: 2px solid var(--border-color);
      border-radius: 12px;
    }

    .question-item {
      padding: 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s ease;
    }

    .question-item.selected {
      background: var(--main-light);
    }

    .question-item:hover {
      background: #f0f0f0;
    }

    .question-item:last-child {
      border-bottom: none;
    }

    .question-checkbox {
      width: 20px;
      height: 20px;
      cursor: pointer;
      margin-right: 12px;
    }

    .question-content {
      flex: 1;
    }

    .question-text {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .question-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .question-meta span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .badge.matched {
      background: #d4edda;
      color: #155724;
    }

    .badge.unmatched {
      background: #f8d7da;
      color: #721c24;
    }

    .badge.faq {
      background: #d1ecf1;
      color: #0c5460;
    }

    .question-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .question-actions button {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .btn-add-answer {
      background: var(--main-tint);
      color: white;
    }

    .btn-add-answer:hover {
      background: var(--main-dark);
    }

    .btn-ignore {
      background: var(--text-muted);
      color: white;
    }

    .btn-ignore:hover {
      background: var(--text-secondary);
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .pagination button {
      padding: 8px 14px;
      border: 2px solid var(--main-tint);
      background: white;
      color: var(--main-dark);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .pagination button:hover:not(:disabled) {
      background: var(--main-tint);
      color: white;
    }

    .pagination button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .pagination button.active {
      background: var(--main-tint);
      color: white;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .empty-state::before {
      content: '📭';
      display: block;
      font-size: 4rem;
      margin-bottom: 16px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: white;
      border-radius: 16px;
      padding: 24px;
      max-width: 90%;
      max-height: 90%;
      overflow-y: auto;
      box-shadow: var(--shadow-hover);
    }

    .modal h3 {
      color: var(--main-dark);
      margin-bottom: 16px;
      font-size: 1.3rem;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      justify-content: flex-end;
    }

    .modal-actions button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .modal-actions .btn-primary {
      background: var(--main-tint);
      color: white;
    }

    .modal-actions .btn-primary:hover {
      background: var(--main-dark);
    }

    .modal-actions .btn-secondary {
      background: var(--text-muted);
      color: white;
    }

    .modal-actions .btn-secondary:hover {
      background: var(--text-secondary);
    }

    .preview-table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 0.9rem;
    }

    .preview-table th,
    .preview-table td {
      padding: 12px;
      border: 1px solid var(--border-color);
      text-align: left;
    }

    .preview-table th {
      background: var(--main-light);
      color: var(--main-dark);
      font-weight: 600;
    }

    .preview-table tr:hover {
      background: #f9f9f9;
    }

    /* Loading Overlay */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .loading-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 6px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Notice Alert */
    .notice-alert {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 16px 20px;
      border-radius: 12px;
      box-shadow: var(--shadow-hover);
      background: white;
      border-left: 4px solid var(--info);
      max-width: 320px;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }

    .notice-alert.error {
      border-left-color: var(--danger);
    }

    .notice-alert.success {
      border-left-color: var(--success);
    }

    .notice-alert.warning {
      border-left-color: var(--warning);
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* Hidden class */
    .hidden {
      display: none !important;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 12px;
      }

      .header {
        padding: 16px;
        flex-direction: column;
        text-align: center;
      }

      .stats-grid {
        grid-template-columns: 1fr 1fr;
      }

      .action-bar,
      .filter-bar {
        flex-direction: column;
      }

      .action-bar button,
      .filter-bar select,
      .filter-bar input,
      .filter-bar button {
        width: 100%;
      }

      .question-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .question-actions {
        width: 100%;
      }

      .question-actions button {
        flex: 1;
      }

      .modal {
        max-width: 95%;
      }

      .preview-table {
        font-size: 0.8rem;
      }

      .preview-table th,
      .preview-table td {
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <!-- Login Section -->
  <div class="login-section" id="loginSection">
    <h2>🔐 관리자 로그인</h2>
    <input 
      type="password" 
      id="adminPassword" 
      placeholder="비밀번호 입력" 
      aria-label="관리자 비밀번호"
    />
    <button onclick="login()">로그인</button>
  </div>

  <!-- Main Content (Hidden until logged in) -->
  <div class="container hidden" id="mainContent">
    <!-- Header -->
    <div class="header">
      <div class="avatar">⚙️</div>
      <div class="header-text">
        <h1>SCM 챗봇 관리자</h1>
        <p>질문 & 답변 관리 시스템</p>
      </div>
    </div>

    <!-- Question Monitor Section -->
    <div class="question-monitor-section">
      <h2>실시간 질문 모니터링</h2>

      <!-- Stats Grid -->
      <div class="stats-grid">
        <div class="stat-card">
          <span class="value" id="totalQuestionsCount">0</span>
          <span class="label">전체 질문</span>
        </div>
        <div class="stat-card">
          <span class="value" id="matchedCount">0</span>
          <span class="label">답변 매칭됨</span>
        </div>
        <div class="stat-card">
          <span class="value" id="unmatchedCount">0</span>
          <span class="label">답변 없음</span>
        </div>
        <div class="stat-card">
          <span class="value" id="matchRate">0%</span>
          <span class="label">매칭률</span>
        </div>
      </div>

      <!-- Action Bar -->
      <div class="action-bar">
        <button onclick="exportToCSV()">
          📥 CSV 다운로드
        </button>
        <button onclick="document.getElementById('csvFileInput').click()">
          📤 CSV 업로드
        </button>
        <button onclick="downloadCSVTemplate()">
          📋 CSV 템플릿 다운로드
        </button>
        <button class="secondary" onclick="toggleSelectAll()">
          ☑️ 전체 선택/해제
        </button>
        <button class="danger" onclick="deleteSelected()" id="deleteBtn" style="display:none;">
          🗑️ 선택 항목 삭제 (<span id="selectedCount">0</span>)
        </button>
      </div>

      <input type="file" id="csvFileInput" accept=".csv" style="display:none;" onchange="handleCSVUpload(event)">

      <!-- Filter Bar -->
      <div class="filter-bar">
        <select id="matchedFilter" aria-label="답변 상태 필터">
          <option value="all">전체</option>
          <option value="matched">답변 있음</option>
          <option value="unmatched">답변 없음</option>
        </select>

        <select id="categoryFilter" aria-label="카테고리 필터">
          <option value="all">전체 카테고리</option>
          <option value="delivery">배송</option>
          <option value="documents">서류</option>
          <option value="production">생산</option>
          <option value="purchase">구매</option>
          <option value="unknown">기타</option>
        </select>

        <input 
          type="text" 
          id="searchQuestion" 
          placeholder="질문 검색..." 
          aria-label="질문 검색"
        />

        <button onclick="loadQuestionMonitor()">🔄 새로고침</button>

        <div class="auto-refresh">
          <input type="checkbox" id="autoRefresh" />
          <label for="autoRefresh">자동 갱신 (30초)</label>
        </div>
      </div>

      <!-- Question List -->
      <div class="question-list" id="questionList">
        <div class="empty-state">데이터를 불러오는 중...</div>
      </div>

      <!-- Pagination -->
      <div class="pagination" id="questionPagination"></div>
    </div>
  </div>

  <!-- Preview Modal -->
  <div class="modal-overlay" id="previewModal">
    <div class="modal">
      <h3>📋 CSV 파일 미리보기</h3>
      <p>아래 데이터를 확인 후 업로드 방식을 선택하세요.</p>
      <div id="previewContent"></div>
      <div class="modal-actions">
        <button class="btn-primary" onclick="uploadCSVData('append')">기존 데이터에 추가</button>
        <button class="btn-primary" onclick="uploadCSVData('replace')">전체 데이터 교체</button>
        <button class="btn-secondary" onclick="closePreviewModal()">취소</button>
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
  </div>

  <script src="shared.js"></script>
  <script>
    'use strict';

    // ========================================
    // Configuration
    // ========================================
    const ADMIN_CONFIG = {
      authMode: 'dev',
      devPassword: 'wpkscm',
      allQuestionsApiUrl: 'https://scmchatbot-api-e9bdbzbgeae3ecgj.koreasouth-01.azurewebsites.net/api/getAllQuestions',
      statsApiUrl: 'https://scmchatbot-api-e9bdbzbgeae3ecgj.koreasouth-01.azurewebsites.net/api/getQuestionStats',
      unmatchedApiUrl: 'https://scmchatbot-api-e9bdbzbgeae3ecgj.koreasouth-01.azurewebsites.net/api/getUnmatched',
      requestTimeoutMs: 12000
    };

    // ========================================
    // Global State
    // ========================================
    let currentPage = 1;
    const itemsPerPage = 20;
    let autoRefreshInterval = null;
    let isLoggedIn = false;
    let allQuestions = [];
    let selectedQuestions = new Set();
    let pendingCSVData = null;

    // ========================================
    // DOM Elements
    // ========================================
    const loginSection = document.getElementById('loginSection');
    const mainContent = document.getElementById('mainContent');
    const adminPassword = document.getElementById('adminPassword');
    const questionList = document.getElementById('questionList');
    const questionPagination = document.getElementById('questionPagination');
    const matchedFilter = document.getElementById('matchedFilter');
    const categoryFilter = document.getElementById('categoryFilter');
    const searchQuestion = document.getElementById('searchQuestion');
    const autoRefresh = document.getElementById('autoRefresh');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const previewModal = document.getElementById('previewModal');
    const deleteBtn = document.getElementById('deleteBtn');
    const selectedCount = document.getElementById('selectedCount');

    // Stats elements
    const totalQuestionsCount = document.getElementById('totalQuestionsCount');
    const matchedCount = document.getElementById('matchedCount');
    const unmatchedCount = document.getElementById('unmatchedCount');
    const matchRate = document.getElementById('matchRate');

    // ========================================
    // Authentication
    // ========================================
    function login() {
      const password = adminPassword.value.trim();

      if (!password) {
        showNotice('비밀번호를 입력해 주세요.', 'warning');
        return;
      }

      if (password === ADMIN_CONFIG.devPassword) {
        isLoggedIn = true;
        loginSection.classList.add('hidden');
        mainContent.classList.remove('hidden');
        showNotice('로그인 성공!', 'success');
        loadQuestionMonitor();
      } else {
        showNotice('비밀번호가 올바르지 않습니다.', 'error');
        adminPassword.value = '';
      }
    }

    // Enter key login
    adminPassword.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        login();
      }
    });

    // ========================================
    // Network Functions
    // ========================================
    async function fetchWithTimeout(url, options = {}, timeout = ADMIN_CONFIG.requestTimeoutMs) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeout);

      try {
        const response = await fetch(url, {
          ...options,
          signal: controller.signal,
          headers: {
            'Content-Type': 'application/json',
            ...options.headers
          }
        });
        clearTimeout(timeoutId);
        return response;
      } catch (err) {
        clearTimeout(timeoutId);
        throw err;
      }
    }

    // ========================================
    // API Functions
    // ========================================
    async function fetchQuestionStats() {
      try {
        const response = await fetchWithTimeout(ADMIN_CONFIG.statsApiUrl);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const data = await response.json();
        return data.ok !== false ? data : null;
      } catch (err) {
        console.error('[통계 조회 오류]', err);
        return null;
      }
    }

    async function fetchAllQuestions(matched = 'all', limit = 20, offset = 0, category = 'all', search = '') {
      try {
        const params = new URLSearchParams({
          matched,
          limit: limit.toString(),
          offset: offset.toString()
        });
        
        if (category !== 'all') params.append('category', category);
        if (search) params.append('search', search);

        const url = `${ADMIN_CONFIG.allQuestionsApiUrl}?${params.toString()}`;
        const response = await fetchWithTimeout(url);

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        return data.ok !== false ? data : { total: 0, questions: [] };
      } catch (err) {
        console.error('[질문 조회 오류]', err);
        return { total: 0, questions: [] };
      }
    }

    // ========================================
    // CSV Functions
    // ========================================
    function downloadCSVTemplate() {
      const headers = ['question', 'category', 'matched', 'source', 'timestamp'];
      const exampleRow = [
        '배송은 얼마나 걸리나요?',
        'delivery',
        'true',
        'user-input',
        new Date().toISOString()
      ];

      const csv = [
        headers.join(','),
        exampleRow.map(escapeCSVValue).join(',')
      ].join('\n');

      downloadFile(csv, `질문_템플릿_${Date.now()}.csv`, 'text/csv');
      showNotice('CSV 템플릿이 다운로드되었습니다.', 'success');
    }

    function exportToCSV() {
      if (!allQuestions || allQuestions.length === 0) {
        showNotice('내보낼 데이터가 없습니다.', 'warning');
        return;
      }

      const headers = ['question', 'category', 'matched', 'source', 'timestamp', 'count'];
      const rows = allQuestions.map(q => [
        q.question,
        q.category,
        q.matched,
        q.source,
        q.timestamp,
        q.count || 1
      ]);

      const csv = [
        headers.join(','),
        ...rows.map(row => row.map(escapeCSVValue).join(','))
      ].join('\n');

      downloadFile(csv, `질문_목록_${Date.now()}.csv`, 'text/csv');
      showNotice('CSV 파일이 다운로드되었습니다.', 'success');
    }

    function escapeCSVValue(value) {
      if (value === null || value === undefined) return '';
      const str = String(value);
      if (str.includes(',') || str.includes('"') || str.includes('\n')) {
        return `"${str.replace(/"/g, '""')}"`;
      }
      return str;
    }

    function downloadFile(content, filename, mimeType) {
      const blob = new Blob(['\uFEFF' + content], { type: `${mimeType};charset=utf-8;` });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function handleCSVUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const text = e.target.result;
          const parsed = parseCSV(text);
          
          if (parsed.length === 0) {
            showNotice('CSV 파일이 비어있습니다.', 'error');
            return;
          }

          pendingCSVData = parsed;
          showPreviewModal(parsed);
        } catch (error) {
          console.error('[CSV 파싱 오류]', error);
          showNotice('CSV 파일 형식이 올바르지 않습니다.', 'error');
        }
      };
      reader.readAsText(file, 'UTF-8');
      event.target.value = '';
    }

    function parseCSV(text) {
      const lines = text.trim().split('\n');
      if (lines.length < 2) return [];

      const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
      const data = [];

      for (let i = 1; i < lines.length; i++) {
        const values = parseCSVLine(lines[i]);
        if (values.length === 0) continue;

        const row = {};
        headers.forEach((header, index) => {
          row[header] = values[index] || '';
        });

        data.push({
          question: row.question || '',
          category: row.category || 'unknown',
          matched: row.matched === 'true' || row.matched === true,
          source: row.source || 'user-input',
          timestamp: row.timestamp || new Date().toISOString(),
          count: parseInt(row.count) || 1
        });
      }

      return data;
    }

    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const nextChar = line[i + 1];

        if (char === '"') {
          if (inQuotes && nextChar === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          result.push(current.trim());
          current = '';
        } else {
          current += char;
        }
      }

      result.push(current.trim());
      return result;
    }

    function showPreviewModal(data) {
      const previewContent = document.getElementById('previewContent');
      
      const table = document.createElement('table');
      table.className = 'preview-table';

      // Header
      const thead = document.createElement('thead');
      thead.innerHTML = `
        <tr>
          <th>질문</th>
          <th>카테고리</th>
          <th>매칭 여부</th>
          <th>출처</th>
        </tr>
      `;
      table.appendChild(thead);

      // Body (최대 10개만 표시)
      const tbody = document.createElement('tbody');
      data.slice(0, 10).forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escapeHTML(item.question)}</td>
          <td>${getCategoryLabel(item.category)}</td>
          <td>${item.matched ? '✓ 있음' : '✗ 없음'}</td>
          <td>${item.source}</td>
        `;
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);

      previewContent.innerHTML = `<p>총 <strong>${data.length}</strong>개의 질문이 포함되어 있습니다.</p>`;
      previewContent.appendChild(table);

      if (data.length > 10) {
        const moreText = document.createElement('p');
        moreText.style.textAlign = 'center';
        moreText.style.color = 'var(--text-muted)';
        moreText.textContent = `... 외 ${data.length - 10}개 항목`;
        previewContent.appendChild(moreText);
      }

      previewModal.classList.add('active');
    }

    function closePreviewModal() {
      previewModal.classList.remove('active');
      pendingCSVData = null;
    }

    async function uploadCSVData(mode) {
      if (!pendingCSVData) return;

      showLoading();
      closePreviewModal();

      // TODO: 서버에 업로드 API 호출
      // 현재는 로컬 시뮬레이션
      await new Promise(resolve => setTimeout(resolve, 1000));

      hideLoading();
      showNotice(`CSV 데이터가 ${mode === 'append' ? '추가' : '교체'}되었습니다.`, 'success');
      
      pendingCSVData = null;
      loadQuestionMonitor();
    }

    // ========================================
    // Selection Functions
    // ========================================
    function toggleQuestionSelection(id, checkbox) {
      if (checkbox.checked) {
        selectedQuestions.add(id);
      } else {
        selectedQuestions.delete(id);
      }
      updateSelectionUI();
    }

    function toggleSelectAll() {
      const checkboxes = document.querySelectorAll('.question-checkbox');
      const allChecked = Array.from(checkboxes).every(cb => cb.checked);

      checkboxes.forEach(cb => {
        cb.checked = !allChecked;
        const id = cb.dataset.id;
        if (!allChecked) {
          selectedQuestions.add(id);
        } else {
          selectedQuestions.delete(id);
        }
      });

      updateSelectionUI();
    }

    function updateSelectionUI() {
      const count = selectedQuestions.size;
      selectedCount.textContent = count;
      deleteBtn.style.display = count > 0 ? 'block' : 'none';

      document.querySelectorAll('.question-item').forEach(item => {
        const checkbox = item.querySelector('.question-checkbox');
        if (checkbox && checkbox.checked) {
          item.classList.add('selected');
        } else {
          item.classList.remove('selected');
        }
      });
    }

    async function deleteSelected() {
      if (selectedQuestions.size === 0) return;

      if (!confirm(`선택한 ${selectedQuestions.size}개의 질문을 삭제하시겠습니까?`)) {
        return;
      }

      showLoading();

      // TODO: 서버 삭제 API 호출
      await new Promise(resolve => setTimeout(resolve, 1000));

      selectedQuestions.clear();
      hideLoading();
      showNotice('선택한 질문이 삭제되었습니다.', 'success');
      loadQuestionMonitor();
    }

    // ========================================
    // Render Functions
    // ========================================
    function updateStats(stats) {
      if (!stats) return;

      totalQuestionsCount.textContent = stats.totalQuestions || 0;
      matchedCount.textContent = stats.matchedCount || 0;
      unmatchedCount.textContent = stats.unmatchedCount || 0;
      matchRate.textContent = (stats.matchRate || '0') + '%';
    }

    function renderQuestionItem(item) {
      const div = document.createElement('div');
      div.className = 'question-item';

      const matchedBadge = item.matched 
        ? '<span class="badge matched">✓ 답변 있음</span>' 
        : '<span class="badge unmatched">✗ 답변 없음</span>';

      const sourceBadge = item.source === 'faq-click' 
        ? '<span class="badge faq">FAQ 클릭</span>' 
        : '';

      const categoryLabel = getCategoryLabel(item.category);
      const timestamp = item.timestamp ? new Date(item.timestamp).toLocaleString('ko-KR') : '알 수 없음';

      div.innerHTML = `
        <input 
          type="checkbox" 
          class="question-checkbox" 
          data-id="${item.id}"
          onchange="toggleQuestionSelection('${item.id}', this)"
          ${selectedQuestions.has(item.id) ? 'checked' : ''}
        />
        <div class="question-content">
          <div class="question-text">${escapeHTML(item.question)}</div>
          <div class="question-meta">
            <span>🕒 ${timestamp}</span>
            <span>📁 ${categoryLabel}</span>
            ${matchedBadge}
            ${sourceBadge}
            ${item.count > 1 ? `<span>🔁 ${item.count}회</span>` : ''}
          </div>
        </div>
        <div class="question-actions">
          ${!item.matched ? `
            <button class="btn-add-answer" onclick="addAnswerForQuestion(\`${escapeHTML(item.question)}\`, '${item.category}')">
              📝 답변 추가
            </button>
          ` : ''}
        </div>
      `;

      return div;
    }

    function renderQuestionList(questions) {
      questionList.innerHTML = '';
      selectedQuestions.clear();

      if (!questions || questions.length === 0) {
        questionList.innerHTML = '<div class="empty-state">표시할 질문이 없습니다.</div>';
        updateSelectionUI();
        return;
      }

      questions.forEach(item => {
        questionList.appendChild(renderQuestionItem(item));
      });

      updateSelectionUI();
    }

    function renderPagination(total) {
      questionPagination.innerHTML = '';

      const totalPages = Math.ceil(total / itemsPerPage);
      if (totalPages <= 1) return;

      // Previous button
      const prevBtn = document.createElement('button');
      prevBtn.textContent = '◀';
      prevBtn.disabled = currentPage === 1;
      prevBtn.onclick = () => {
        currentPage--;
        loadQuestionMonitor();
      };
      questionPagination.appendChild(prevBtn);

      // Page numbers
      const startPage = Math.max(1, currentPage - 2);
      const endPage = Math.min(totalPages, currentPage + 2);

      for (let i = startPage; i <= endPage; i++) {
        const pageBtn = document.createElement('button');
        pageBtn.textContent = i;
        pageBtn.className = i === currentPage ? 'active' : '';
        pageBtn.onclick = () => {
          currentPage = i;
          loadQuestionMonitor();
        };
        questionPagination.appendChild(pageBtn);
      }

      // Next button
      const nextBtn = document.createElement('button');
      nextBtn.textContent = '▶';
      nextBtn.disabled = currentPage === totalPages;
      nextBtn.onclick = () => {
        currentPage++;
        loadQuestionMonitor();
      };
      questionPagination.appendChild(nextBtn);
    }

    // ========================================
    // Main Load Function
    // ========================================
    async function loadQuestionMonitor() {
      if (!isLoggedIn) return;

      showLoading();

      try {
        // Load stats
        const stats = await fetchQuestionStats();
        updateStats(stats);

        // Load questions
        const matchedValue = matchedFilter.value;
        const categoryValue = categoryFilter.value;
        const searchValue = searchQuestion.value.trim();
        const offset = (currentPage - 1) * itemsPerPage;

        const result = await fetchAllQuestions(
          matchedValue,
          itemsPerPage,
          offset,
          categoryValue,
          searchValue
        );

        allQuestions = result.questions || [];
        renderQuestionList(allQuestions);
        renderPagination(result.total);

      } catch (err) {
        console.error('[모니터링 로드 오류]', err);
        showNotice('질문 목록을 불러올 수 없습니다.', 'error');
      } finally {
        hideLoading();
      }
    }

    // ========================================
    // Action Functions
    // ========================================
    function addAnswerForQuestion(question, category) {
      alert(`"${question}" 에 대한 답변을 추가하세요.\n\n카테고리: ${getCategoryLabel(category)}\n\nshared.js의 DEFAULT_QA에 항목을 추가하거나, 별도 관리 UI를 구현하세요.`);
    }

    // ========================================
    // Auto Refresh
    // ========================================
    autoRefresh.addEventListener('change', (e) => {
      if (e.target.checked) {
        autoRefreshInterval = setInterval(loadQuestionMonitor, 30000);
        showNotice('자동 갱신이 활성화되었습니다.', 'success');
      } else {
        if (autoRefreshInterval) {
          clearInterval(autoRefreshInterval);
          autoRefreshInterval = null;
        }
        showNotice('자동 갱신이 비활성화되었습니다.', 'info');
      }
    });

    // Filter change events
    matchedFilter.addEventListener('change', () => {
      currentPage = 1;
      loadQuestionMonitor();
    });

    categoryFilter.addEventListener('change', () => {
      currentPage = 1;
      loadQuestionMonitor();
    });

    // Search with debounce
    let searchTimeout;
    searchQuestion.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        currentPage = 1;
        loadQuestionMonitor();
      }, 500);
    });

    // ========================================
    // Utility Functions
    // ========================================
    function showLoading() {
      loadingOverlay.classList.add('active');
    }

    function hideLoading() {
      loadingOverlay.classList.remove('active');
    }

    function escapeHTML(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function getCategoryLabel(category) {
      const labels = {
        all: '전체',
        delivery: '배송',
        documents: '서류',
        production: '생산',
        purchase: '구매',
        other: '기타'
      };
      return labels[category] || category;
    }

    function showNotice(message, type = 'info') {
      const notice = document.createElement('div');
      notice.className = `notice-alert ${type}`;
      notice.textContent = message;
      document.body.appendChild(notice);

      setTimeout(() => {
        notice.style.animation = 'slideIn 0.3s ease reverse';
        setTimeout(() => notice.remove(), 300);
      }, 3000);
    }

    // ========================================
    // Initialization
    // ========================================
    document.addEventListener('DOMContentLoaded', () => {
      console.log('✅ Admin 페이지 로드 완료');
      adminPassword.focus();
    });

    // Cleanup on unload
    window.addEventListener('beforeunload', () => {
      if (autoRefreshInterval) {
        clearInterval(autoRefreshInterval);
      }
    });
  </script>
</body>
