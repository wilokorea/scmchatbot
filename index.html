<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCM 업무 도우미</title>
  <style>
    :root{
      --main:#009C82;
      --main-dark:#007a66;
      --bg:#f4f8f7;
      --line:#d8e5e2;
      --text:#1f2937;
      --sub:#6b7280;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
      background:linear-gradient(135deg,#f4fbf9,#eef7f5);
      color:var(--text);
    }

    .wrap{
      max-width:500px;
      margin:24px auto;
      background:#fff;
      border:1px solid var(--line);
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 16px 40px rgba(0,0,0,.08);
      min-height:90vh;
      display:flex;
      flex-direction:column;
    }

    .header{
      background:var(--main);
      color:#fff;
      padding:18px;
      display:flex;
      align-items:center;
      gap:12px;
    }

    .avatar{
      width:46px;
      height:46px;
      border-radius:50%;
      background:rgba(255,255,255,.18);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      flex-shrink:0;
    }

    .header h1{
      margin:0;
      font-size:20px;
    }

    .header p{
      margin:6px 0 0;
      font-size:13px;
      opacity:.95;
    }

    .notice{
      background:#f8fbfb;
      border-bottom:1px solid var(--line);
      padding:10px 14px;
      font-size:12px;
      color:var(--sub);
      text-align:center;
    }

    .chat{
      flex:1;
      overflow-y:auto;
      padding:16px;
      background:#f8fbfb;
    }

    .row{
      display:flex;
      gap:8px;
      margin-bottom:14px;
      align-items:flex-end;
    }

    .row.user{
      justify-content:flex-end;
    }

    .bot-icon{
      width:34px;
      height:34px;
      border-radius:50%;
      background:#e7f7f3;
      color:var(--main-dark);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:15px;
      font-weight:bold;
      flex-shrink:0;
    }

    .bubble-group{
      max-width:78%;
    }

    .sender{
      font-size:12px;
      color:#64748b;
      margin:0 0 4px 4px;
    }

    .bubble{
      padding:12px 14px;
      border-radius:18px;
      line-height:1.55;
      font-size:14px;
      word-break:break-word;
      white-space:pre-wrap;
    }

    .bot .bubble{
      background:#fff;
      border:1px solid var(--line);
      border-bottom-left-radius:6px;
    }

    .user .bubble{
      background:var(--main);
      color:#fff;
      border-bottom-right-radius:6px;
    }

    .time{
      font-size:11px;
      color:#94a3b8;
      margin-top:4px;
      padding:0 4px;
    }

    .user .time{
      text-align:right;
    }

    .faq{
      padding:12px;
      border-top:1px solid var(--line);
      background:#fff;
    }

    .faq-title{
      font-size:13px;
      font-weight:700;
      color:#334155;
      margin-bottom:8px;
    }

    .category-tabs{
      display:flex;
      gap:8px;
      overflow-x:auto;
      padding-bottom:4px;
    }

    .category-tab{
      border:none;
      background:#e8f7f3;
      color:#006f5c;
      padding:9px 13px;
      border-radius:999px;
      cursor:pointer;
      white-space:nowrap;
      font-size:13px;
      flex-shrink:0;
    }

    .category-tab.active{
      background:var(--main);
      color:#fff;
    }

    .faq-list{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .faq-list button{
      width:100%;
      border:none;
      background:#eef7f5;
      color:#135f53;
      padding:12px;
      border-radius:12px;
      cursor:pointer;
      font-size:14px;
      text-align:left;
      line-height:1.5;
    }

    .faq-list button:hover{
      background:#dff3ef;
    }

    .empty-faq{
      font-size:13px;
      color:var(--sub);
      padding:8px 2px;
    }

    .input-area{
      border-top:1px solid var(--line);
      padding:12px;
      background:#fff;
    }

    .input-wrap{
      display:flex;
      gap:8px;
      background:#f7fbfb;
      border:1px solid var(--line);
      border-radius:16px;
      padding:8px;
    }

    .input-wrap input{
      flex:1;
      border:none;
      outline:none;
      background:transparent;
      padding:10px;
      font-size:14px;
    }

    .input-wrap button{
      border:none;
      background:var(--main);
      color:#fff;
      border-radius:12px;
      width:48px;
      cursor:pointer;
      font-size:18px;
    }

    @media (max-width:520px){
      .wrap{
        margin:0;
        max-width:none;
        border-radius:0;
        min-height:100vh;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="avatar">💬</div>
      <div>
        <h1>SCM 업무 도우미</h1>
        <p>문의 내용을 입력하시면 아는 선에서 답변해 드리겠습니다</p>
      </div>
    </div>

    <div class="notice">
      아래 카테고리를 선택하면 해당 FAQ가 아래에 표시됩니다.
    </div>

    <div class="chat" id="chatBox"></div>

    <div class="faq">
      <div class="faq-title">카테고리</div>
      <div class="category-tabs" id="categoryTabs"></div>

      <div class="faq-title" style="margin-top:12px;">자주 묻는 질문</div>
      <div class="faq-list" id="faqList"></div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <input id="userInput" type="text" placeholder="질문을 입력하세요" />
        <button onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>

  <script src="shared.js"></script>
  <script>
    const chatBox = document.getElementById("chatBox");
    const faqList = document.getElementById("faqList");
    const categoryTabs = document.getElementById("categoryTabs");
    const userInput = document.getElementById("userInput");

    let selectedCategory = "all";

    function sendToServer(data){
      fetch("https://scmchatbot-api-e9bdbzbgeae3ecgj.koreasouth-01.azurewebsites.net/api/logQuestion", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      }).catch(err => console.error("server log error:", err));
    }

    async function loadTopQuestionsFromServer(category) {
      try {
        const res = await fetch(
          `https://scmchatbot-api-e9bdbzbgeae3ecgj.koreasouth-01.azurewebsites.net/api/getTopQuestions?category=${encodeURIComponent(category)}`
        );
        const data = await res.json();
        return Array.isArray(data.items) ? data.items : [];
      } catch (e) {
        console.error("load top questions failed", e);
        return [];
      }
    }

    function getTimeText() {
      const now = new Date();
      return now.toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function formatAnswer(text) {
      return escapeHtml(String(text)).replaceAll("\n", "<br>");
    }

    function addMessage(text, sender, name = "") {
      const row = document.createElement("div");
      row.className = `row ${sender}`;

      if (sender === "bot") {
        row.innerHTML = `
          <div class="bot-icon">Q</div>
          <div class="bubble-group bot">
            <div class="sender">${name || "상담봇"}</div>
            <div class="bubble"></div>
            <div class="time">${getTimeText()}</div>
          </div>
        `;
      } else {
        row.innerHTML = `
          <div class="bubble-group user">
            <div class="sender">나</div>
            <div class="bubble"></div>
            <div class="time">${getTimeText()}</div>
          </div>
        `;
      }

      row.querySelector(".bubble").innerHTML = formatAnswer(text);
      chatBox.appendChild(row);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function renderCategoryTabs() {
      const categories = ChatbotStore.getCategories();
      const labels = ChatbotStore.getCategoryLabels();

      categoryTabs.innerHTML = "";

      categories.forEach(category => {
        const btn = document.createElement("button");
        btn.className = `category-tab ${selectedCategory === category ? "active" : ""}`;
        btn.textContent = labels[category] || category;
        btn.onclick = async () => {
          selectedCategory = category;
          renderCategoryTabs();
          await renderFAQ();
        };
        categoryTabs.appendChild(btn);
      });
    }

    async function renderFAQ() {
      const qa = ChatbotStore.getQAByCategory(selectedCategory);
      faqList.innerHTML = "";

      let topQA = await loadTopQuestionsFromServer(selectedCategory);

      if (topQA.length === 0) {
        topQA = qa.filter(item => item.top).slice(0, 4);
      }

      if (topQA.length === 0) {
        topQA = qa.slice(0, 4);
      }

      if (topQA.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty-faq";
        empty.textContent = "이 카테고리에 등록된 FAQ가 없습니다.";
        faqList.appendChild(empty);
        return;
      }

      topQA.forEach(item => {
        const btn = document.createElement("button");
        btn.textContent = item.question;
        btn.onclick = () => sendMessage(item.question, true);
        faqList.appendChild(btn);
      });
    }

    function sendMessage(customText = null, isFaqClick = false) {
      const text = (customText ?? userInput.value).trim();
      if (!text) return;

      addMessage(text, "user");
      userInput.value = "";

      const result = ChatbotStore.findAnswer(text, selectedCategory);
      const answer = result
        ? result.answer
        : "등록된 답변을 찾지 못했습니다. 해당 문의 사항은 SCM팀 담당자에게 문의 부탁드립니다.";

      setTimeout(() => addMessage(answer, "bot", "FAQ 챗봇"), 250);

      ChatbotStore.saveHistory({
        question: text,
        answer,
        matched: !!result,
        category: result ? result.category : selectedCategory,
        createdAt: new Date().toISOString(),
        source: isFaqClick ? "faq-click" : "user"
      });

      sendToServer({
        question: text,
        answer: answer,
        matched: !!result,
        category: result ? result.category : selectedCategory,
        createdAt: new Date().toISOString(),
        page: location.href,
        userAgent: navigator.userAgent,
        source: isFaqClick ? "faq-click" : "user"
      });
    }

    userInput.addEventListener("keydown", e => {
      if (e.key === "Enter") sendMessage();
    });

    addMessage(
      "안녕하세요.\n문의사항을 입력하거나 아래 FAQ를 선택해주세요.",
      "bot",
      "SCM 도우미"
    );
    renderCategoryTabs();
    renderFAQ();
  </script>
</body>
</html>
