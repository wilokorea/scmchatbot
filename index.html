<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCM FAQ봇</title>
  <style>
    :root{
      --main:#009C82;
      --main-dark:#007a66;
      --bg:#f4f8f7;
      --line:#d8e5e2;
      --text:#1f2937;
      --sub:#6b7280;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
      background:linear-gradient(135deg,#f4fbf9,#eef7f5);
      color:var(--text);
    }

    .wrap{
      max-width:500px;
      margin:24px auto;
      background:#fff;
      border:1px solid var(--line);
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 16px 40px rgba(0,0,0,.08);
      min-height:90vh;
      display:flex;
      flex-direction:column;
    }

    .header{
      background:var(--main);
      color:#fff;
      padding:18px;
      display:flex;
      align-items:center;
      gap:12px;
    }

    .avatar{
      width:46px;
      height:46px;
      border-radius:50%;
      background:rgba(255,255,255,.18);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      flex-shrink:0;
    }

    .header h1{ margin:0; font-size:20px; }
    .header p{ margin:6px 0 0; font-size:13px; opacity:.95; }

    .notice{
      background:#f8fbfb;
      border-bottom:1px solid var(--line);
      padding:10px 14px;
      font-size:12px;
      color:var(--sub);
      text-align:center;
    }

    .chat{
      flex:1;
      overflow-y:auto;
      padding:16px;
      background:#f8fbfb;
    }

    .row{
      display:flex;
      gap:8px;
      margin-bottom:14px;
      align-items:flex-end;
    }

    .row.user{ justify-content:flex-end; }

    .bot-icon{
      width:34px;
      height:34px;
      border-radius:50%;
      background:#e7f7f3;
      color:var(--main-dark);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:15px;
      font-weight:bold;
      flex-shrink:0;
    }

    .bubble-group{ max-width:78%; }
    .sender{ font-size:12px; color:#64748b; margin:0 0 4px 4px; }

    .bubble{
      padding:12px 14px;
      border-radius:18px;
      line-height:1.55;
      font-size:14px;
      word-break:break-word;
      white-space:pre-wrap;
    }

    .bot .bubble{
      background:#fff;
      border:1px solid var(--line);
      border-bottom-left-radius:6px;
    }

    .user .bubble{
      background:var(--main);
      color:#fff;
      border-bottom-right-radius:6px;
    }

    .time{ font-size:11px; color:#94a3b8; margin-top:4px; padding:0 4px; }
    .user .time{ text-align:right; }

    .faq{
      padding:12px;
      border-top:1px solid var(--line);
      background:#fff;
    }

    .faq-title{
      font-size:13px;
      font-weight:700;
      color:#334155;
      margin-bottom:8px;
    }

    .category-tabs{
      display:flex;
      gap:8px;
      overflow-x:auto;
      padding-bottom:4px;
    }

    .category-tab{
      border:none;
      background:#e8f7f3;
      color:#006f5c;
      padding:9px 13px;
      border-radius:999px;
      cursor:pointer;
      white-space:nowrap;
      font-size:13px;
      flex-shrink:0;
    }

    .category-tab.active{ background:var(--main); color:#fff; }

    .faq-list{ display:flex; flex-direction:column; gap:8px; }

    .faq-list button{
      width:100%;
      border:none;
      background:#eef7f5;
      color:#135f53;
      padding:12px;
      border-radius:12px;
      cursor:pointer;
      font-size:14px;
      text-align:left;
      line-height:1.5;
    }

    .faq-list button:hover{ background:#dff3ef; }
    .faq-list button:disabled{ opacity:.65; cursor:not-allowed; }

    /* ✅ 수정: 클릭 횟수 뱃지 스타일 추가 */
    .freq-badge{
      display:inline-block;
      background:var(--main);
      color:#fff;
      font-size:11px;
      padding:2px 7px;
      border-radius:999px;
      margin-left:6px;
      vertical-align:middle;
    }

    .empty-faq{ font-size:13px; color:var(--sub); padding:8px 2px; }
    .typing{ opacity:.8; font-style:italic; }

    .input-area{
      border-top:1px solid var(--line);
      padding:12px;
      background:#fff;
    }

    .input-wrap{
      display:flex;
      gap:8px;
      background:#f7fbfb;
      border:1px solid var(--line);
      border-radius:16px;
      padding:8px;
    }

    .input-wrap input{
      flex:1;
      border:none;
      outline:none;
      background:transparent;
      padding:10px;
      font-size:14px;
    }

    .input-wrap button{
      border:none;
      background:var(--main);
      color:#fff;
      border-radius:12px;
      width:48px;
      cursor:pointer;
      font-size:18px;
    }

    .input-wrap button:disabled{ opacity:.7; cursor:not-allowed; }

    @media (max-width:520px){
      .wrap{
        margin:0;
        max-width:none;
        border-radius:0;
        min-height:100vh;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="avatar">💬</div>
      <div>
        <h1>SCM봇</h1>
        <p>문의 내용을 입력하시면 등록된 답변을 안내드립니다.</p>
      </div>
    </div>

    <div class="notice">아래 카테고리를 선택하면 해당 FAQ가 아래에 표시됩니다.</div>

    <div class="chat" id="chatBox"></div>

    <div class="faq">
      <div class="faq-title">카테고리</div>
      <div class="category-tabs" id="categoryTabs"></div>

      <div class="faq-title" style="margin-top:12px;">자주 묻는 질문</div>
      <div class="faq-list" id="faqList"></div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <input id="userInput" type="text" placeholder="질문을 입력하세요" />
        <button id="sendButton" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>

  <script>
    window.CHATBOT_CONFIG = Object.assign({
      logApiUrl: "https://scmchatbot-api-e9bdbzbgeae3ecgj.koreasouth-01.azurewebsites.net/api/logQuestion",
      topQuestionsApiUrl: "https://scmchatbot-api-e9bdbzbgeae3ecgj.koreasouth-01.azurewebsites.net/api/getTopQuestions",
      requestTimeoutMs: 10000,
      faqButtonCount: 4
    }, window.CHATBOT_CONFIG || {});
  </script>
  <script src="shared.js"></script>
  <script>
    const chatBox = document.getElementById("chatBox");
    const faqList = document.getElementById("faqList");
    const categoryTabs = document.getElementById("categoryTabs");
    const userInput = document.getElementById("userInput");
    const sendButton = document.getElementById("sendButton");

    let selectedCategory = (window.ChatbotStore && ChatbotStore.getCategories()[0]) || "all";
    let isSending = false;

    function getTimeText() {
      return new Date().toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function formatAnswer(text) {
      return escapeHtml(String(text)).replaceAll("\n", "<br>");
    }

    function addMessage(text, sender, name = "", extraClass = "") {
      const row = document.createElement("div");
      row.className = `row ${sender} ${extraClass}`.trim();

      if (sender === "bot") {
        row.innerHTML = `
          <div class="bot-icon">Q</div>
          <div class="bubble-group bot">
            <div class="sender">${escapeHtml(name || "상담봇")}</div>
            <div class="bubble"></div>
            <div class="time">${getTimeText()}</div>
          </div>
        `;
      } else {
        row.innerHTML = `
          <div class="bubble-group user">
            <div class="sender">나</div>
            <div class="bubble"></div>
            <div class="time">${getTimeText()}</div>
          </div>
        `;
      }

      row.querySelector(".bubble").innerHTML = formatAnswer(text);
      chatBox.appendChild(row);
      chatBox.scrollTop = chatBox.scrollHeight;
      return row;
    }

    function removeRow(row) {
      if (row && row.parentNode) row.parentNode.removeChild(row);
    }

    // ✅ 수정: frequency 기준으로 내림차순 정렬 추가
    function normalizeTopItems(items, fallbackQa) {
      if (Array.isArray(items) && items.length) {
        return items
          .filter(item => item && item.question)
          .sort((a, b) => (b.frequency || 0) - (a.frequency || 0))  // ✅ frequency 내림차순 정렬
          .slice(0, window.CHATBOT_CONFIG.faqButtonCount)
          .map(item => ({
            question: String(item.question).trim(),
            category: item.category || selectedCategory,
            frequency: item.frequency || 0  // ✅ frequency 보존
          }));
      }

      // fallback: 로컬 QA에서 top 우선, 없으면 앞에서부터
      const topLocal = fallbackQa.filter(item => item.top).slice(0, window.CHATBOT_CONFIG.faqButtonCount);
      if (topLocal.length) return topLocal.map(item => ({ ...item, frequency: 0 }));
      return fallbackQa.slice(0, window.CHATBOT_CONFIG.faqButtonCount).map(item => ({ ...item, frequency: 0 }));
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = window.CHATBOT_CONFIG.requestTimeoutMs || 10000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        return await fetch(url, { ...options, signal: controller.signal });
      } finally {
        clearTimeout(timer);
      }
    }

    async function sendToServer(data) {
      if (!window.CHATBOT_CONFIG.logApiUrl) return;
      try {
        const res = await fetchWithTimeout(window.CHATBOT_CONFIG.logApiUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error(`log api ${res.status}`);
      } catch (err) {
        console.warn("server log error:", err);
        const pending = JSON.parse(localStorage.getItem("chatbot_pending_logs") || "[]");
        pending.push(data);
        localStorage.setItem("chatbot_pending_logs", JSON.stringify(pending.slice(-100)));
      }
    }

    async function loadTopQuestionsFromServer(category) {
      try {
        const res = await fetchWithTimeout(
          `${window.CHATBOT_CONFIG.topQuestionsApiUrl}?category=${encodeURIComponent(category)}`
        );

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();
        return Array.isArray(data.items) ? data.items : [];
      } catch (e) {
        console.error("top questions failed", e);
        return [];
      }
    }

    function renderCategoryTabs() {
      const categories = ChatbotStore.getCategories();
      const labels = ChatbotStore.getCategoryLabels();
      if (!categories.includes(selectedCategory)) {
        selectedCategory = categories[0] || "all";
      }

      categoryTabs.innerHTML = "";
      categories.forEach(category => {
        const btn = document.createElement("button");
        btn.className = `category-tab ${selectedCategory === category ? "active" : ""}`;
        btn.textContent = labels[category] || category;
        btn.onclick = async () => {
          if (isSending) return;
          selectedCategory = category;
          renderCategoryTabs();
          await renderFAQ();
        };
        categoryTabs.appendChild(btn);
      });
    }

    async function renderFAQ() {
      const qa = ChatbotStore.getQAByCategory(selectedCategory);
      faqList.innerHTML = '<div class="empty-faq">로딩 중...</div>';
      
      try {
        const topQA = normalizeTopItems(await loadTopQuestionsFromServer(selectedCategory), qa);

        faqList.innerHTML = "";

        if (!topQA.length) {
          const empty = document.createElement("div");
          empty.className = "empty-faq";
          empty.textContent = "이 카테고리에 등록된 FAQ가 없습니다.";
          faqList.appendChild(empty);
          return;
        }

        topQA.forEach(item => {
          const btn = document.createElement("button");
          btn.type = "button";

          // ✅ 수정: 질문 텍스트 + 클릭 횟수 뱃지 표시
          const questionText = document.createTextNode(item.question);
          btn.appendChild(questionText);
          if (item.frequency > 0) {
            const badge = document.createElement("span");
            badge.className = "freq-badge";
            badge.textContent = `${item.frequency}회`;
            btn.appendChild(badge);
          }

          btn.onclick = async () => {
            if (btn.disabled || isSending) return;
            btn.disabled = true;
            try {
              // ✅ 수정: FAQ의 고유 카테고리를 함께 전달
              await sendMessage(item.question, true, item.category);
            } finally {
              setTimeout(() => { btn.disabled = false; }, 500);
            }
          };
          faqList.appendChild(btn);
        });
      } catch (error) {
        console.error("FAQ 로딩 오류:", error);
        faqList.innerHTML = '<div class="empty-faq">FAQ를 불러오는 중 오류가 발생했습니다.</div>';
      }
    }

    // ✅ 수정: faqCategory 파라미터 추가 + 매칭 로직 개선
    async function sendMessage(customText = null, isFaqClick = false, faqCategory = null) {
      const text = (customText ?? userInput.value).trim();
      if (!text || isSending) return;

      isSending = true;
      sendButton.disabled = true;
      userInput.disabled = true;

      addMessage(text, "user");
      userInput.value = "";
      const typingRow = addMessage("답변을 찾는 중입니다...", "bot", "SCM봇", "typing");

      try {
        // ✅ 수정: FAQ 클릭인 경우 해당 항목의 카테고리에서 먼저 검색,
        //          없으면 전체(all)에서도 검색하여 매칭률 향상
        const searchCategory = faqCategory || selectedCategory;
        let result = ChatbotStore.findAnswer(text, searchCategory);

        // 카테고리 한정 검색에서 못 찾으면 전체에서 재검색
        if (!result && searchCategory !== "all") {
          result = ChatbotStore.findAnswer(text, "all");
        }

        // ✅ 수정: 그래도 못 찾으면 부분 매칭(키워드 기반) 시도
        if (!result) {
          result = fuzzyFindAnswer(text);
        }

        const answer = result
          ? result.answer
          : "등록된 답변을 찾지 못했습니다. 해당 문의 사항은 SCM팀 담당자에게 문의 부탁드립니다.";

        await new Promise(resolve => setTimeout(resolve, 250));
        removeRow(typingRow);
        addMessage(answer, "bot", "SCM봇");

        const payload = {
          question: text,
          answer,
          matched: !!result,
          category: result ? result.category : searchCategory,
          createdAt: new Date().toISOString(),
          timestamp: Date.now(),
          page: location.href,
          userAgent: navigator.userAgent,
          source: isFaqClick ? "faq-click" : "user"
        };

        ChatbotStore.saveHistory(payload);
        
        try {
          await sendToServer(payload);
        } catch (err) {
          console.warn("서버 로깅 실패:", err);
        }
      } catch (error) {
        console.error("메시지 전송 오류:", error);
        removeRow(typingRow);
        addMessage("죄송합니다. 일시적인 오류가 발생했습니다. 다시 시도해 주세요.", "bot", "SCM봇");
      } finally {
        isSending = false;
        sendButton.disabled = false;
        userInput.disabled = false;
        userInput.focus();
      }
    }

    // ✅ 신규 추가: 부분 매칭(fuzzy) 함수 - 질문 텍스트가 약간 달라도 매칭
    function fuzzyFindAnswer(query) {
      if (!window.ChatbotStore) return null;

      const normalizedQuery = query.replace(/\s+/g, "").toLowerCase();
      const allQA = ChatbotStore.getQAByCategory("all") || [];
      
      let bestMatch = null;
      let bestScore = 0;

      for (const item of allQA) {
        const normalizedQ = (item.question || "").replace(/\s+/g, "").toLowerCase();

        // 방법 1: 한쪽이 다른 한쪽을 포함하는 경우
        if (normalizedQuery.includes(normalizedQ) || normalizedQ.includes(normalizedQuery)) {
          const score = Math.min(normalizedQuery.length, normalizedQ.length) 
                      / Math.max(normalizedQuery.length, normalizedQ.length);
          if (score > bestScore) {
            bestScore = score;
            bestMatch = item;
          }
        }

        // 방법 2: 공통 키워드 비율
        const queryChars = new Set(normalizedQuery);
        const itemChars = new Set(normalizedQ);
        const intersection = [...queryChars].filter(c => itemChars.has(c));
        const charScore = intersection.length / Math.max(queryChars.size, itemChars.size);
        if (charScore > 0.7 && charScore > bestScore) {
          bestScore = charScore;
          bestMatch = item;
        }
      }

      // 최소 60% 이상 매칭되어야 결과 반환
      return bestScore >= 0.6 ? bestMatch : null;
    }

    userInput.addEventListener("keydown", e => {
      if (e.key === "Enter") sendMessage();
    });

    addMessage("안녕하세요.\n문의사항을 입력하거나 아래 FAQ를 선택해주세요.", "bot", "SCM봇");
    renderCategoryTabs();
    renderFAQ();
  </script>
</body>
</html>
