<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.azurewebsites.net; img-src 'self' data:; font-src 'self';" />
  <meta name="description" content="SCM 업무 관련 자주 묻는 질문에 대한 빠른 답변을 제공하는 챗봇입니다." />
  <title>SCM FAQ봇</title>
  <style>
    :root {
      --main-tint: #009C82;
      --main-dark: #007a66;
      --main-light: #e6f7f4;
      --bg-color: #f4f8f7;
      --card-bg: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #4a4a4a;
      --text-muted: #888;
      --border-color: #ddd;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-hover: 0 4px 12px rgba(0,0,0,0.12);
      --danger: #e74c3c;
      --warning: #f39c12;
      --info: #3498db;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: var(--bg-color);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Header */
    .header {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .avatar {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--main-tint), var(--main-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 1.5rem;
      color: var(--main-dark);
      margin-bottom: 4px;
    }

    .header-text p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* Notice */
    .notice-bar {
      background: var(--main-light);
      border-left: 4px solid var(--main-tint);
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      color: var(--main-dark);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .notice-bar::before {
      content: '📢';
      font-size: 1.2rem;
    }

    /* Chat area */
    .chat-card {
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      overflow: hidden;
    }

    .chat-area {
      height: 400px;
      overflow-y: auto;
      padding: 20px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      animation: fadeIn 0.3s ease;
      position: relative;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--main-tint);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .message.user .message-avatar {
      background: var(--text-secondary);
    }

    .message-content {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 16px;
      background: var(--main-light);
      color: var(--text-primary);
      word-wrap: break-word;
      user-select: text;
      cursor: text;
    }

    .message.user .message-content {
      background: var(--main-tint);
      color: white;
    }

    .message-content a {
      color: var(--main-dark);
      text-decoration: underline;
      word-break: break-all;
    }

    .message.user .message-content a {
      color: white;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: var(--main-light);
      border-radius: 16px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--main-tint);
      animation: typing 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.7; }
      30% { transform: translateY(-10px); opacity: 1; }
    }

    /* FAQ Section */
    .faq-section {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }

    .faq-section h2 {
      font-size: 1.2rem;
      color: var(--main-dark);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .faq-section h2::before {
      content: '💡';
      font-size: 1.4rem;
    }

    .faq-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }

    .faq-btn {
      background: var(--main-light);
      border: 2px solid transparent;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.9rem;
      color: var(--main-dark);
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      font-weight: 500;
    }

    .faq-btn:hover {
      background: var(--main-tint);
      color: white;
      border-color: var(--main-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .faq-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Input area */
    .input-area {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
    }

    #userInput {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      font-size: 1rem;
      transition: border-color 0.3s ease;
      resize: none;
      font-family: inherit;
      line-height: 1.4;
    }

    #userInput:focus {
      outline: none;
      border-color: var(--main-tint);
    }

    #sendBtn {
      padding: 14px 28px;
      background: var(--main-tint);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    #sendBtn:hover:not(:disabled) {
      background: var(--main-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    #sendBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .char-counter {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-align: right;
    }

    .char-counter.warning {
      color: var(--warning);
      font-weight: 600;
    }

    .char-counter.danger {
      color: var(--danger);
      font-weight: 600;
    }

    /* Scroll button */
    .scroll-bottom-btn {
      position: fixed;
      bottom: 180px;
      right: calc(50% - 380px);
      width: 48px;
      height: 48px;
      background: var(--main-tint);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: var(--shadow-hover);
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scroll-bottom-btn.visible {
      opacity: 1;
      visibility: visible;
    }

    .scroll-bottom-btn:hover {
      background: var(--main-dark);
      transform: translateY(-2px);
    }

    /* Debug panel */
    .debug-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 200px;
      background: rgba(0, 0, 0, 0.9);
      color: #0f0;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      overflow-y: auto;
      padding: 10px;
      border-top: 2px solid #0f0;
      z-index: 9999;
      display: none;
    }

    .debug-panel.active {
      display: block;
    }

    .debug-panel .log-entry {
      margin-bottom: 4px;
      word-wrap: break-word;
    }

    .debug-panel .log-entry.error {
      color: #f00;
    }

    .debug-panel .log-entry.warn {
      color: #ff0;
    }

    /* Live region for screen readers */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Notice alert styles */
    .notice-alert {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 16px 20px;
      border-radius: 12px;
      box-shadow: var(--shadow-hover);
      background: white;
      border-left: 4px solid var(--info);
      max-width: 320px;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }

    .notice-alert.error {
      border-left-color: var(--danger);
    }

    .notice-alert.warning {
      border-left-color: var(--warning);
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* Copy hint */
    .message-content::after {
      content: '';
      display: none;
    }

    .message-content.show-copy-hint::after {
      content: '복사됨!';
      position: absolute;
      top: -30px;
      right: 0;
      background: var(--main-dark);
      color: white;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      display: block;
      animation: fadeOut 1.5s ease forwards;
    }

    @keyframes fadeOut {
      0%, 50% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 12px;
      }

      .header {
        padding: 16px;
        flex-direction: column;
        text-align: center;
      }

      .chat-area {
        height: 300px;
      }

      .faq-container {
        grid-template-columns: 1fr;
      }

      .message-content {
        max-width: 85%;
      }

      .scroll-bottom-btn {
        right: 20px;
        bottom: 140px;
      }

      .input-wrapper {
        flex-direction: column;
      }

      #sendBtn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="avatar">🤖</div>
      <div class="header-text">
        <h1>SCM FAQ봇</h1>
        <p>Supply Chain Management 업무 지원 챗봇입니다</p>
      </div>
    </div>

    <!-- Notice -->
    <div class="notice-bar">
      업무 시간 내 평균 응답 시간은 5초 이내입니다. 복잡한 문의는 담당자에게 연결해 드립니다.
    </div>

    <!-- Chat Card -->
    <div class="chat-card">
      <div class="chat-area" id="chatArea" role="log" aria-live="polite" aria-label="대화 내용">
        <div class="message bot">
          <div class="message-avatar">🤖</div>
          <div class="message-content">
            안녕하세요! SCM FAQ봇입니다. 궁금하신 내용을 입력해 주세요. 😊
          </div>
        </div>
      </div>
    </div>

    <!-- FAQ Section -->
    <div class="faq-section">
      <h2>자주 묻는 질문</h2>
      <div class="faq-container" id="faqContainer" role="list" aria-label="자주 묻는 질문">
        <p style="text-align:center;color:var(--text-muted);">인기 질문 불러오는 중...</p>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea 
          id="userInput" 
          placeholder="질문을 입력하세요..." 
          rows="2"
          maxlength="500"
          aria-label="질문 입력"
        ></textarea>
        <button id="sendBtn" aria-label="전송">전송</button>
      </div>
      <div class="char-counter" id="charCounter">0 / 500</div>
    </div>

    <!-- Scroll Button -->
    <button class="scroll-bottom-btn" id="scrollBottomBtn" aria-label="최신 메시지로 이동">
      ↓
    </button>
  </div>

  <!-- Screen reader live region -->
  <div class="sr-only" role="status" aria-live="polite" aria-atomic="true" id="srLive"></div>

  <!-- Debug Panel -->
  <div class="debug-panel" id="debugPanel"></div>

  <!-- Shared utilities -->
  <script src="shared.js"></script>

  <!-- [위에서 제공한 INDEX.HTML 스크립트 부분 붙여넣기] -->
  
</body>
</html>
